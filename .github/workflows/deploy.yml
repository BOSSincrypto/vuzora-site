name: Deploy to GitHub Pages

# Запускается при каждом пуше в main (свежий контент после правок)
# и раз в сутки по cron — чтобы пересобрать sitemap с актуальным lastmod
# и подтянуть любые изменения в src/content/* без ручного триггера.
on:
  push:
    branches: [main]
  schedule:
    # 03:15 UTC ежедневно ≈ 06:15 МСК, до утренней доставки бота
    - cron: "15 3 * * *"
  workflow_dispatch:

# Keep only the newest queued build/deploy for the Pages site.
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test

      - name: Build static site
        run: bun run build
        env:
          NODE_ENV: production
          TZ: UTC
          SOURCE_DATE_EPOCH: "0"

      - name: Validate first release artifacts
        run: bun run validate:release

      - name: Install browser regression tooling
        run: npm install --global agent-browser@0.32.3 && agent-browser install
        timeout-minutes: 10

      - name: Start static browser validation server
        run: |
          nohup node scripts/static-server.mjs dist >/tmp/vuzora-browser-server.log 2>&1 &
          for attempt in $(seq 1 30); do
            curl --fail --silent http://127.0.0.1:3100/ >/dev/null && exit 0
            sleep 1
          done
          cat /tmp/vuzora-browser-server.log
          exit 1

      - name: Run hit-tested browser regression
        run: bun run test:browser:mobile-menu
        env:
          VUZORA_ORIGIN: http://127.0.0.1:3100
          AGENT_BROWSER_SESSION: vuzora-release-${{ github.run_id }}

      - name: Run unknown-route metadata regression
        run: bun run test:browser:unknown-route-metadata
        env:
          VUZORA_ORIGIN: http://127.0.0.1:3100
          AGENT_BROWSER_SESSION: vuzora-unknown-route-${{ github.run_id }}

      - name: Run blog metadata regression
        run: bun run test:browser:blog-metadata
        env:
          VUZORA_ORIGIN: http://127.0.0.1:3100
          AGENT_BROWSER_SESSION: vuzora-blog-metadata-${{ github.run_id }}

      - name: Run WebMCP regression
        run: bun run test:browser:webmcp
        env:
          VUZORA_ORIGIN: http://127.0.0.1:3100
          AGENT_BROWSER_SESSION: vuzora-webmcp-${{ github.run_id }}

      - name: Run two clean frozen-install build cycles
        run: bun run repeat:release
        timeout-minutes: 20
        env:
          NODE_ENV: production
          TZ: UTC
          SOURCE_DATE_EPOCH: "0"

      - name: Remove validated transport manifest
        run: bun run finalize:release

      - name: Check upload tree
        run: test ! -e dist/release-manifest.json && test -s dist/index.html && test -s dist/404.html && test -s dist/sitemap.xml

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: dist
          include-hidden-files: true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
