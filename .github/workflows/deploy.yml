name: Deploy to GitHub Pages

# Запускается при каждом пуше в main (свежий контент после правок)
# и раз в сутки по cron — чтобы пересобрать sitemap с актуальным lastmod
# и подтянуть любые изменения в src/content/* без ручного триггера.
on:
  push:
    branches: [main]
  schedule:
    # 03:15 UTC ежедневно ≈ 06:15 МСК, до утренней доставки бота
    - cron: "15 3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Не отменять текущий деплой при пуше — пусть катится по очереди
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test

      - name: Build static site
        run: bun run build
        env:
          NODE_ENV: production

      - name: Validate release artifacts
        run: bun run validate:release

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
