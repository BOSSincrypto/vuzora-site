name: Deploy to GitHub Pages

# Запускается при каждом пуше в main (свежий контент после правок)
# и раз в сутки по cron — чтобы пересобрать sitemap с актуальным lastmod
# и подтянуть любые изменения в src/content/* без ручного триггера.
on:
  push:
    branches: [main]
  schedule:
    # 03:15 UTC ежедневно ≈ 06:15 МСК, до утренней доставки бота
    - cron: "15 3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Не отменять текущий деплой при пуше — пусть катится по очереди
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test

      - name: Build static site
        run: bun run build
        env:
          NODE_ENV: production
          TZ: UTC
          SOURCE_DATE_EPOCH: "0"

      - name: Validate first release artifacts
        run: bun run validate:release

      - name: Install browser regression tooling
        run: npm install --global agent-browser && agent-browser install

      - name: Start static browser validation server
        run: |
          nohup python3 -m http.server 3100 --bind 127.0.0.1 --directory dist >/tmp/vuzora-browser-server.log 2>&1 &
          for attempt in $(seq 1 30); do
            curl --fail --silent http://127.0.0.1:3100/ >/dev/null && exit 0
            sleep 1
          done
          cat /tmp/vuzora-browser-server.log
          exit 1

      - name: Run hit-tested browser regression
        run: bun run test:browser:mobile-menu
        env:
          VUZORA_ORIGIN: http://127.0.0.1:3100
          AGENT_BROWSER_SESSION: vuzora-release-${{ github.run_id }}

      - name: Run two clean frozen-install build cycles
        run: bun run repeat:release
        env:
          NODE_ENV: production
          TZ: UTC
          SOURCE_DATE_EPOCH: "0"

      - name: Remove validated transport manifest
        run: bun run finalize:release

      - name: Check upload tree
        run: test ! -e dist/release-manifest.json && test -s dist/index.html && test -s dist/404.html && test -s dist/sitemap.xml

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist
          include-hidden-files: true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
